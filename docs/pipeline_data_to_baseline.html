
<style>
* { box-sizing: border-box; }
.sr-only { position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0); }
.stepper { display:flex; gap:0; margin-bottom:1.5rem; overflow-x:auto; padding-bottom:4px; }
.step-btn { flex:1; min-width:80px; padding:8px 4px; border:none; background:transparent; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; position:relative; }
.step-btn:not(:last-child)::after { content:''; position:absolute; right:0; top:20px; width:1px; height:16px; background:var(--color-border-tertiary); }
.step-dot { width:28px; height:28px; border-radius:50%; border:2px solid var(--color-border-secondary); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:500; color:var(--color-text-secondary); background:var(--color-background-primary); transition:all .2s; }
.step-btn.active .step-dot { border-color:#185FA5; background:#E6F1FB; color:#185FA5; }
.step-btn.done .step-dot { border-color:#0F6E56; background:#E1F5EE; color:#0F6E56; }
.step-label { font-size:10px; color:var(--color-text-tertiary); text-align:center; line-height:1.3; max-width:76px; }
.step-btn.active .step-label { color:var(--color-text-primary); font-weight:500; }
.panel { background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:12px; padding:1.25rem; }
.panel-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:1rem; }
.panel-title { font-size:15px; font-weight:500; color:var(--color-text-primary); margin:0; }
.panel-sub { font-size:12px; color:var(--color-text-secondary); margin-top:3px; }
.badge { font-size:11px; font-weight:500; padding:3px 10px; border-radius:999px; white-space:nowrap; }
.badge-file { background:var(--color-background-info); color:var(--color-text-info); }
.badge-warn { background:var(--color-background-warning); color:var(--color-text-warning); }
.badge-ok { background:var(--color-background-success); color:var(--color-text-success); }
.badge-gray { background:var(--color-background-secondary); color:var(--color-text-secondary); }
.cols-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:1rem; }
.col-card { background:var(--color-background-secondary); border-radius:8px; padding:10px 12px; }
.col-card-title { font-size:11px; font-weight:500; color:var(--color-text-secondary); margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
.col-tag { display:inline-block; font-family:var(--font-mono); font-size:11px; padding:2px 7px; border-radius:4px; margin:2px; color:var(--color-text-primary); background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); }
.col-tag.highlight { background:#E6F1FB; border-color:#B5D4F4; color:#0C447C; }
.col-tag.removed { background:#FCEBEB; border-color:#F7C1C1; color:#A32D2D; text-decoration:line-through; }
.col-tag.new { background:#E1F5EE; border-color:#9FE1CB; color:#085041; }
.col-tag.transformed { background:#FAEEDA; border-color:#FAC775; color:#633806; }
.transform-list { list-style:none; padding:0; margin:0; }
.transform-list li { display:flex; align-items:flex-start; gap:8px; font-size:12px; color:var(--color-text-secondary); padding:5px 0; border-bottom:0.5px solid var(--color-border-tertiary); line-height:1.5; }
.transform-list li:last-child { border-bottom:none; }
.t-icon { flex-shrink:0; width:18px; height:18px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:500; margin-top:1px; }
.t-clean { background:#E1F5EE; color:#0F6E56; }
.t-new { background:#E6F1FB; color:#185FA5; }
.t-drop { background:#FCEBEB; color:#A32D2D; }
.t-encode { background:#FAEEDA; color:#854F0B; }
.shape-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-bottom:10px; }
.shape-box { background:var(--color-background-secondary); border-radius:6px; padding:4px 10px; font-family:var(--font-mono); font-size:12px; color:var(--color-text-primary); border:0.5px solid var(--color-border-secondary); }
.arrow-small { color:var(--color-text-tertiary); font-size:14px; }
.nav-row { display:flex; justify-content:space-between; margin-top:1rem; }
.nav-btn { padding:6px 16px; border-radius:999px; border:0.5px solid var(--color-border-secondary); background:transparent; cursor:pointer; font-size:12px; color:var(--color-text-secondary); }
.nav-btn:hover { background:var(--color-background-secondary); }
.nav-btn:disabled { opacity:0.3; cursor:not-allowed; }
.api-note { background:#FAEEDA; border:0.5px solid #FAC775; border-radius:8px; padding:10px 12px; font-size:12px; color:#633806; margin-top:10px; }
</style>

<h2 class="sr-only">Pipeline de dados do projeto churn — da leitura do raw até o treino do baseline</h2>

<div class="stepper" id="stepper">
  <button class="step-btn active" onclick="go(0)"><div class="step-dot">0</div><div class="step-label">Raw data</div></button>
  <button class="step-btn" onclick="go(1)"><div class="step-dot">1</div><div class="step-label">0.01 data source</div></button>
  <button class="step-btn" onclick="go(2)"><div class="step-dot">2</div><div class="step-label">1.01 cleaning</div></button>
  <button class="step-btn" onclick="go(3)"><div class="step-dot">3</div><div class="step-label">1.02 features</div></button>
  <button class="step-btn" onclick="go(4)"><div class="step-dot">4</div><div class="step-label">1.03 preprocess</div></button>
  <button class="step-btn" onclick="go(5)"><div class="step-dot">5</div><div class="step-label">Baseline</div></button>
</div>

<div class="panel" id="panel"></div>

<script>
const steps = [
  {
    title: "Raw data",
    sub: "data/raw/raw_telco_customer_churn.xlsx",
    badge: { text: "entrada", cls: "badge-gray" },
    shape: { from: null, to: "(7043, 33)" },
    content: `
      <div class="cols-grid">
        <div class="col-card">
          <div class="col-card-title">Colunas por tipo</div>
          <span class="col-tag">3 numéricas</span>
          <span class="col-tag">16 categóricas</span>
          <span class="col-tag">9 ID/Geo</span>
          <span class="col-tag">3 pós-cancelamento</span>
          <span class="col-tag">2 target/label</span>
        </div>
        <div class="col-card">
          <div class="col-card-title">Problemas identificados</div>
          <span class="col-tag highlight">Total Charges como string</span>
          <span class="col-tag highlight">11 nulos (tenure=0)</span>
          <span class="col-tag highlight">Churn Reason 73% nulos</span>
          <span class="col-tag highlight">Desbalanceamento 73/27</span>
        </div>
      </div>
      <ul class="transform-list">
        <li><div class="t-icon t-drop">×</div><span>Colunas de leakage isoladas em COLS_POS: <code>Churn Score</code>, <code>CLTV</code>, <code>Churn Reason</code> — geradas após o evento</span></li>
        <li><div class="t-icon t-drop">×</div><span>Colunas ID/Geo isoladas em COLS_ID: <code>CustomerID</code>, <code>Country</code>, <code>City</code>, lat, long, etc.</span></li>
      </ul>`
  },
  {
    title: "0.01 — data source",
    sub: "data/interim/telco_typed.parquet",
    badge: { text: "interim", cls: "badge-file" },
    shape: { from: "(7043, 33)", to: "(7043, 20)" },
    content: `
      <ul class="transform-list">
        <li><div class="t-icon t-drop">×</div><span>Remove 9 colunas ID/Geo — sem poder preditivo</span></li>
        <li><div class="t-icon t-drop">×</div><span>Remove 3 colunas COLS_POS — data leakage</span></li>
        <li><div class="t-icon t-drop">×</div><span>Remove <code>Churn Label</code> — string redundante do target</span></li>
        <li><div class="t-icon t-clean">✓</div><span>Converte <code>Total Charges</code> de string (object) para float64 via <code>pd.to_numeric(errors='coerce')</code></span></li>
        <li><div class="t-icon t-clean">✓</div><span>Salva 20 colunas: 3 num + 16 cat + 1 target — strings originais preservadas</span></li>
      </ul>
      <div class="cols-grid" style="margin-top:10px">
        <div class="col-card">
          <div class="col-card-title">Colunas mantidas</div>
          <span class="col-tag">tenure_months</span>
          <span class="col-tag">monthly_charges</span>
          <span class="col-tag">total_charges</span>
          <span class="col-tag">+ 16 categóricas</span>
          <span class="col-tag">churn_value (target)</span>
        </div>
        <div class="col-card">
          <div class="col-card-title">Notas</div>
          <span style="font-size:12px;color:var(--color-text-secondary)">Nulos de total_charges ainda presentes (11). Strings categóricas intactas. Sem encoding ainda.</span>
        </div>
      </div>`
  },
  {
    title: "1.01 — data cleaning",
    sub: "data/interim/telco_cleaned.parquet",
    badge: { text: "interim", cls: "badge-file" },
    shape: { from: "(7043, 20)", to: "(7021, 20)" },
    content: `
      <ul class="transform-list">
        <li><div class="t-icon t-clean">✓</div><span>Snake_case em todos os nomes de colunas: <code>Tenure Months</code> → <code>tenure_months</code></span></li>
        <li><div class="t-icon t-clean">✓</div><span>Imputa 11 nulos de <code>total_charges</code> com mediana (1397.47) — clientes com tenure=0</span></li>
        <li><div class="t-icon t-clean">✓</div><span>Normalização semântica: <code>"No internet service"</code> → <code>"No"</code> em 6 colunas (1526 registros cada)</span></li>
        <li><div class="t-icon t-clean">✓</div><span>Corrige inconsistências lógicas: clientes sem internet não podem ter serviços de internet ativos</span></li>
        <li><div class="t-icon t-drop">×</div><span>Remove 22 duplicatas estruturais (detectáveis só após remoção do CustomerID)</span></li>
        <li><div class="t-icon t-clean">✓</div><span>Strings Yes/No preservadas — encoding é responsabilidade do 1.03</span></li>
      </ul>
      <div class="api-note">
        <strong>Nota para a API:</strong> o endpoint recebe dados brutos com espaços nos nomes e strings "Yes"/"No". Aplicar <code>to_snake_case()</code> antes de passar para o preprocessor.
      </div>`
  },
  {
    title: "1.02 — feature engineering",
    sub: "data/interim/telco_features.parquet",
    badge: { text: "interim", cls: "badge-file" },
    shape: { from: "(7021, 20)", to: "(7021, 26)" },
    content: `
      <ul class="transform-list">
        <li><div class="t-icon t-new">+</div><span><code>num_services</code> — soma de serviços ativos (compara com <code>"Yes"</code>)</span></li>
        <li><div class="t-icon t-new">+</div><span><code>charges_per_month</code> — <code>monthly_charges / (tenure + 1)</code></span></li>
        <li><div class="t-icon t-new">+</div><span><code>is_month_to_month</code> — flag 0/1 se <code>contract == "Month-to-month"</code></span></li>
        <li><div class="t-icon t-new">+</div><span><code>tenure_group</code> — string: "novo" ≤12m / "medio" 13-48m / "longo" >48m</span></li>
        <li><div class="t-icon t-new">+</div><span><code>has_security_support</code> — flag 0/1 se <code>online_security == "Yes"</code> ou <code>tech_support == "Yes"</code></span></li>
        <li><div class="t-icon t-new">+</div><span><code>is_fiber_optic</code> — flag 0/1 se <code>internet_service == "Fiber optic"</code></span></li>
      </ul>
      <div class="cols-grid" style="margin-top:10px">
        <div class="col-card">
          <div class="col-card-title">Ainda são strings (encoding no 1.03)</div>
          <span class="col-tag">online_security (Yes/No)</span>
          <span class="col-tag">tech_support (Yes/No)</span>
          <span class="col-tag">contract (3 cats)</span>
          <span class="col-tag">internet_service (3 cats)</span>
          <span class="col-tag">payment_method (4 cats)</span>
          <span class="col-tag">gender (2 cats)</span>
          <span class="col-tag">tenure_group (string)</span>
        </div>
        <div class="col-card">
          <div class="col-card-title">Já são int (passthrough)</div>
          <span class="col-tag new">is_month_to_month</span>
          <span class="col-tag new">has_security_support</span>
          <span class="col-tag new">is_fiber_optic</span>
          <span class="col-tag new">num_services</span>
        </div>
      </div>`
  },
  {
    title: "1.03 — preprocessing",
    sub: "data/processed/train.parquet + test.parquet + models/preprocessor.pkl",
    badge: { text: "processed + artefato", cls: "badge-ok" },
    shape: { from: "(7021, 26)", to: "train resampled + test original" },
    content: `
      <ul class="transform-list">
        <li><div class="t-icon t-clean">✓</div><span><strong>Split estratificado 80/20</strong> — <code>stratify=y</code> preserva 26% de churn em ambos os conjuntos</span></li>
        <li><div class="t-icon t-encode">~</div><span><strong>num (5 colunas)</strong>: <code>SimpleImputer → FunctionTransformer(log1p) → StandardScaler</code> — tenure, monthly, total_charges, num_services, charges_per_month</span></li>
        <li><div class="t-icon t-encode">~</div><span><strong>bin (12 colunas Yes/No)</strong>: <code>OrdinalEncoder(["No","Yes"])</code> → No=0, Yes=1 com categorias fixas</span></li>
        <li><div class="t-icon t-encode">~</div><span><strong>ohe (5 colunas nominais)</strong>: <code>OneHotEncoder(drop="first")</code> — internet_service, contract, payment_method, gender, tenure_group</span></li>
        <li><div class="t-icon t-clean">✓</div><span><strong>pass (4 colunas int)</strong>: passthrough — is_month_to_month, has_security_support, is_fiber_optic, senior_citizen</span></li>
        <li><div class="t-icon t-new">+</div><span><strong>SMOTE+ENN apenas no X_train</strong> — balanceia classes sem contaminar o X_test</span></li>
        <li><div class="t-icon t-clean">✓</div><span><strong>preprocessor.pkl</strong> serializado — reutilizado identicamente na API FastAPI</span></li>
      </ul>
      <div class="api-note">
        <strong>Na API FastAPI:</strong> recebe JSON bruto → aplica <code>to_snake_case()</code> → cria features 1.02 → <code>preprocessor.transform()</code> → predição. SMOTE+ENN não é aplicado em inferência.
      </div>`
  },
  {
    title: "Baseline models",
    sub: "MLflow experiment: churn-telecom",
    badge: { text: "MLflow", cls: "badge-warn" },
    shape: { from: "train.parquet", to: "métricas + artefatos" },
    content: `
      <ul class="transform-list">
        <li><div class="t-icon t-clean">✓</div><span><strong>3.01 DummyClassifier</strong> — referência mínima. Registra accuracy, F1, Recall, AUC no MLflow</span></li>
        <li><div class="t-icon t-clean">✓</div><span><strong>3.02 Regressão Logística</strong> — baseline interpretável. Registra coeficientes como feature importance</span></li>
        <li><div class="t-icon t-clean">✓</div><span><strong>3.03 RandomForest / XGBoost</strong> — benchmark competitivo. Registra feature importance para decidir descarte de gender e phone_service</span></li>
      </ul>
      <div class="cols-grid" style="margin-top:10px">
        <div class="col-card">
          <div class="col-card-title">Cada run registra no MLflow</div>
          <span class="col-tag">AUC-ROC</span>
          <span class="col-tag">F1-score</span>
          <span class="col-tag">Recall</span>
          <span class="col-tag">Precision</span>
          <span class="col-tag">confusion matrix</span>
          <span class="col-tag">ROC curve</span>
          <span class="col-tag">parâmetros</span>
        </div>
        <div class="col-card">
          <div class="col-card-title">Todos carregam assim</div>
          <span style="font-size:11px;font-family:var(--font-mono);color:var(--color-text-secondary);line-height:1.8">
            train = pd.read_parquet(...)<br>
            X = train.drop(TARGET)<br>
            y = train[TARGET]<br>
            model.fit(X, y)
          </span>
        </div>
      </div>`
  }
];

let current = 0;

function render() {
  const s = steps[current];
  const btns = document.querySelectorAll('.step-btn');
  btns.forEach((b, i) => {
    b.classList.remove('active', 'done');
    if (i === current) b.classList.add('active');
    else if (i < current) b.classList.add('done');
  });
  document.getElementById('panel').innerHTML = `
    <div class="panel-header">
      <div>
        <p class="panel-title">${s.title}</p>
        <p class="panel-sub">${s.sub}</p>
      </div>
      <span class="badge ${s.badge.cls}">${s.badge.text}</span>
    </div>
    ${s.shape.from ? `<div class="shape-row"><span class="shape-box">${s.shape.from}</span><span class="arrow-small">→</span><span class="shape-box">${s.shape.to}</span></div>` : `<div class="shape-row"><span class="shape-box">${s.shape.to}</span></div>`}
    ${s.content}
    <div class="nav-row">
      <button class="nav-btn" onclick="go(${current-1})" ${current===0?'disabled':''}>← anterior</button>
      <button class="nav-btn" onclick="go(${current+1})" ${current===steps.length-1?'disabled':''}>próximo →</button>
    </div>`;
}

function go(i) {
  if (i < 0 || i >= steps.length) return;
  current = i;
  render();
}

render();
</script>
